[extension]
name = "scry"
version = "0.1.0"
description = "Agentic local image generation — FLUX, Stable Diffusion, LoRA, fine-tunes"
sdk_version = "0.15"

[runtime]
type = "native"
binary = "target/release/scry"

[startup]
ping_method = "get_tools"
timeout_ms = 10000

[secrets]
# Optional — scry works anonymously, but these unlock gated repos and higher rate limits.
# Operators can configure via: omegon secret set HF_TOKEN <value>
# In --mcp mode (no omegon parent), values are read from process env at startup.
required = []
optional = ["HF_TOKEN", "CIVITAI_TOKEN"]

[widgets.gallery]
label = "Gallery"
kind = "stateful"
renderer = "table"
description = "Generated image history with parameters and outputs"

[widgets.preview]
label = "Preview"
kind = "ephemeral"
renderer = "graph"
description = "Image preview modal for generation results"

[widgets.models]
label = "Models"
kind = "stateful"
renderer = "table"
description = "Local model catalog — checkpoints, LoRAs, VAEs"

[config.models_dir]
type = "string"
label = "Models directory"
description = "Path to local model checkpoints, LoRAs, and VAEs"
required = false
placeholder = "~/.scry/models"

[config.output_dir]
type = "string"
label = "Output directory"
description = "Where generated images are saved"
required = false
placeholder = "~/.scry/output"

[config.comfyui_url]
type = "string"
label = "ComfyUI server URL"
description = "HTTP endpoint for ComfyUI backend (leave empty to skip)"
required = false
placeholder = "http://127.0.0.1:8188"

[config.python_bin]
type = "string"
label = "Python binary"
description = "Path to Python interpreter for the diffusers backend"
required = false
default = "python3"

[config.default_steps]
type = "number"
label = "Default inference steps"
required = false
default = "30"

[config.default_guidance]
type = "number"
label = "Default guidance scale"
required = false
default = "7.5"

[mind]
enabled = false

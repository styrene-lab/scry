[extension]
name = "scry"
version = "0.1.0"
description = "Agentic local image generation — FLUX, Stable Diffusion, LoRA, fine-tunes"
sdk_version = "0.15"

[runtime]
type = "native"
binary = "target/release/scry"

[startup]
ping_method = "get_tools"
timeout_ms = 10000

[secrets]
# Optional — scry works anonymously, but these unlock gated repos and higher rate limits.
# Operators can configure via: omegon secret set HF_TOKEN <value>
# In --mcp mode (no omegon parent), values are read from process env at startup.
required = []
optional = ["HF_TOKEN", "CIVITAI_TOKEN"]

[widgets.gallery]
label = "Gallery"
kind = "stateful"
renderer = "table"
description = "Generated image history with parameters and outputs"

[widgets.preview]
label = "Preview"
kind = "ephemeral"
renderer = "graph"
description = "Image preview modal for generation results"

[widgets.models]
label = "Models"
kind = "stateful"
renderer = "table"
description = "Local model catalog — checkpoints, LoRAs, VAEs"

[mind]
enabled = false
